<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Food</title>
</head>
<body>
    <button id="loadFood">Load My food</button>
    <button id="logoutBtn">Logout</button>
    <br><br><br>
    <h1>Add food item</h1>
    <div>
    <form action="" id="foodForm">
        <Label>Name : </Label>
        <input type="text" name="" id="name" placeholder="name of the food" required/>
        <br><br>
        <Label>Quantity : </Label>
        <input type="number" name="" id="quantity" placeholder="enter quantity" required/>
        <br><br>
        <Label>Price : </Label>
        <input type="number" name="" id="price" placeholder="enter price for one" required/>
        <br><br>
        <Label>Expiry Time : </Label>
        <input type="datetime" name="" id="expiry_time" placeholder="expiry time YYYY-MM-DD HH:MM:SS format" required/>
        <br><br>
        <Label>Veg/Non Veg : </Label>
        <select name="" id="veg">
            <option value="true">Veg</option>
            <option value="false">Non Veg</option>
        </select>
        <br><br>
        <button type="submit">Add Food</button>
    </form>
    </div>

    <h3 id="message"></h3>
    <hr><br>

    <h2>Delete food item</h2>
    <form action="" id="deleteFood">
        <input type="number" name=" " id="foodId" placeholder="Enter food Id " required/>
        <br><br>
        <button type="submit">Delete</button>

    </form>
    <h3 id="deleteMessage"></h3>
    

    <script src="../src/pages/addFood.js"></script>
</body>
</html>
