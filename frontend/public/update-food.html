<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Update food items</h1>
    <form action="" id="updatefood">
        <input type="number" name="" id="foodId" placeholder="Food Id" required/>
        <br><br>
        <input type="text" id="name" placeholder="Food Name" required/>
        <br><br>
        <input type="number" name="" id="quantity" placeholder="Quantity" required/>
        <br><br>
        <input type="number" name="" id="price" placeholder="Price" required/>
        <br><br>
        <input type="datetime" name="" id="expiry" placeholder="Expiry time" required/>
        <br><br>
        <select name="" id="veg">
            <option value="true">Veg</option>
            <option value="false">Non Veg</option>
        </select>
        <br><br><br>
        <button type="submit">
            Update
        </button>
    </form>

    <h3 id="message"></h3>

    
    <script src="../src/pages/updateFood.js"></script>
</body>
</html>
